<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoScribe - AI 音视频转写</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Animated background -->
    <div class="bg-gradient"></div>

    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2L2 7l10 5 10-5-10-5z" fill="url(#g1)" opacity="0.9"/>
                        <path d="M2 17l10 5 10-5" stroke="url(#g1)" stroke-width="2" fill="none"/>
                        <path d="M2 12l10 5 10-5" stroke="url(#g1)" stroke-width="2" fill="none" opacity="0.6"/>
                        <defs><linearGradient id="g1" x1="0" y1="0" x2="24" y2="24"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
                    </svg>
                </div>
                <div>
                    <h1>EchoScribe</h1>
                    <p class="tagline">AI 驱动的音视频转写与智能分析</p>
                </div>
            </div>
            <button class="settings-btn" id="settings-btn" title="设置">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </header>

        <!-- Input Card -->
        <section class="input-card glass">
            <div class="tabs">
                <button class="tab active" data-tab="url">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                    URL 输入
                </button>
                <button class="tab" data-tab="file">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    文件上传
                </button>
            </div>

            <div class="tab-content active" id="tab-url">
                <form id="url-form">
                    <div class="input-row">
                        <input type="text" id="url-input" placeholder="粘贴 Bilibili、YouTube 等视频链接..." required>
                        <button type="submit" class="btn-primary" id="url-submit">
                            <span class="btn-text">开始转写</span>
                            <span class="btn-loading" style="display:none;">
                                <span class="dot-pulse"></span>
                            </span>
                        </button>
                    </div>
                </form>
            </div>

            <div class="tab-content" id="tab-file">
                <form id="file-form">
                    <div class="upload-area" id="upload-area">
                        <div class="upload-icon">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                        </div>
                        <p class="upload-main">拖拽文件到此处，或<span class="upload-link">点击选择</span></p>
                        <p class="upload-hint">MP3 / WAV / MP4 / FLAC / M4A 等格式</p>
                        <input type="file" id="file-input" accept="audio/*,video/*" hidden>
                        <p class="file-name" id="file-name"></p>
                    </div>
                    <button type="submit" class="btn-primary btn-full" id="file-submit">
                        <span class="btn-text">开始转写</span>
                        <span class="btn-loading" style="display:none;">
                            <span class="dot-pulse"></span>
                        </span>
                    </button>
                </form>
            </div>
        </section>

        <!-- Loading -->
        <div class="loading-card glass" id="loading" style="display: none;">
            <div class="loading-inner">
                <div class="pulse-ring"></div>
                <div class="spinner"></div>
                <p id="loading-text">正在处理，请稍候...</p>
                <div class="loading-bar"><div class="loading-bar-fill"></div></div>
            </div>
        </div>

        <!-- Error -->
        <div class="error-card" id="error" style="display: none;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            <p id="error-text"></p>
        </div>

        <!-- Results -->
        <div class="results" id="results" style="display: none;">
            <!-- Meta bar -->
            <div class="meta-bar glass" id="result-meta"></div>

            <!-- Two-column layout -->
            <div class="dashboard">
                <!-- Left: Video + Summary -->
                <div class="dashboard-left">
                    <!-- Video Player -->
                    <div class="panel video-panel" id="video-section" style="display: none;">
                        <div class="panel-head">
                            <div class="panel-title">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                视频预览
                            </div>
                        </div>
                        <div class="video-wrap">
                            <video id="video-player" controls preload="metadata"></video>
                        </div>
                    </div>

                    <!-- Summary + Transcription (tabbed) -->
                    <div class="panel summary-panel">
                        <div class="panel-head">
                            <div class="panel-tabs" id="summary-tabs">
                                <button class="panel-tab active" data-panel="summary">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                                    AI 总结
                                </button>
                                <button class="panel-tab" data-panel="transcription">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                                    转写原文
                                    <span class="sentence-count" id="sentence-count"></span>
                                </button>
                            </div>
                            <div class="panel-actions">
                                <button class="icon-btn" id="export-summary" title="导出 AI 总结">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                </button>
                                <button class="icon-btn" id="export-transcription" title="导出转写原文" style="display:none;">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                </button>
                            </div>
                        </div>
                        <div class="panel-view active" id="panel-summary">
                            <div class="panel-body markdown-body" id="summary-result"></div>
                        </div>
                        <div class="panel-view" id="panel-transcription">
                            <div class="panel-body transcription-body" id="transcription-result"></div>
                        </div>
                    </div>

                    <!-- Deepen -->
                    <div class="panel deepen-panel">
                        <div class="panel-head">
                            <div class="panel-title">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                                深入追问
                            </div>
                        </div>
                        <div class="panel-body">
                            <div class="deepen-input-row">
                                <input type="text" id="deepen-input" placeholder="对转写内容追问更多细节..." />
                                <button class="btn-primary btn-sm" id="deepen-submit">追问</button>
                            </div>
                            <div class="deepen-loading" id="deepen-loading" style="display:none;">
                                <div class="mini-spinner"></div>
                                <span>AI 思考中...</span>
                            </div>
                            <div id="deepen-results"></div>
                        </div>
                    </div>
                </div>

                <div class="resize-handle" id="resize-handle"></div>

                <!-- Right: Mind Map -->
                <div class="dashboard-right">
                    <div class="panel mindmap-panel">
                        <div class="panel-head">
                            <div class="panel-title">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="4" cy="6" r="2"/><circle cx="20" cy="6" r="2"/><circle cx="4" cy="18" r="2"/><circle cx="20" cy="18" r="2"/><line x1="9.5" y1="10" x2="5.5" y2="7.5"/><line x1="14.5" y1="10" x2="18.5" y2="7.5"/><line x1="9.5" y1="14" x2="5.5" y2="16.5"/><line x1="14.5" y1="14" x2="18.5" y2="16.5"/></svg>
                                思维导图
                            </div>
                            <div class="panel-actions">
                                <button class="icon-btn" id="mindmap-fit" title="自适应">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                                </button>
                                <button class="icon-btn" id="mindmap-zoom-in" title="放大">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                                </button>
                                <button class="icon-btn" id="mindmap-zoom-out" title="缩小">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                                </button>
                                <button class="icon-btn" id="mindmap-fullscreen" title="全屏">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                                </button>
                                <button class="icon-btn" id="export-mindmap" title="导出思维导图">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                </button>
                                <button class="icon-btn" id="open-svg" title="打开本地 SVG">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 19a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4l2 3h9a2 2 0 0 1 2 2v1"/><path d="M9 17h10.5a1.5 1.5 0 0 0 1.46-1.18l1.5-6A1.5 1.5 0 0 0 19.5 8H14l-1.5 3"/></svg>
                                </button>
                            </div>
                        </div>
                        <div class="mindmap-body" id="mindmap-wrap">
                            <div class="markmap" id="mindmap-container">
                                <script type="text/template">
                                    <!-- mindmap content will be injected here -->
                                </script>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal" style="display:none;">
        <div class="modal glass">
            <div class="modal-head">
                <h3>设置</h3>
                <button class="icon-btn" id="settings-close">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <!-- 导出设置 -->
                <div class="setting-section">
                    <div class="setting-section-title">导出设置</div>
                    <div class="setting-group">
                        <label class="setting-label">导出格式</label>
                        <div class="setting-row">
                            <label class="radio-label"><input type="radio" name="export-format" value="md" checked> Markdown (.md)</label>
                            <label class="radio-label"><input type="radio" name="export-format" value="txt"> 纯文本 (.txt)</label>
                        </div>
                    </div>
                    <div class="setting-group">
                        <label class="setting-label">文件名前缀</label>
                        <input type="text" id="export-prefix" class="setting-input" placeholder="EchoScribe" value="EchoScribe">
                    </div>
                </div>

                <!-- 大模型配置 -->
                <div class="setting-section">
                    <div class="setting-section-title">大模型配置</div>
                    <div class="setting-group">
                        <label class="setting-label">AI 后端</label>
                        <div class="setting-row">
                            <label class="radio-label"><input type="radio" name="llm-backend" value="custom_api" checked> 自定义 API</label>
                            <label class="radio-label"><input type="radio" name="llm-backend" value="claude_cli"> Claude CLI</label>
                        </div>
                    </div>

                    <div id="custom-api-settings">
                        <div class="setting-group">
                            <label class="setting-label">Base URL</label>
                            <input type="text" id="api-base-url" class="setting-input" placeholder="https://api.openai.com 或 http://localhost:11434">
                        </div>
                        <div class="setting-group">
                            <label class="setting-label">API Key</label>
                            <div class="input-with-toggle">
                                <input type="password" id="api-key" class="setting-input" placeholder="sk-...（本地模型可留空）">
                                <button class="icon-btn input-toggle-btn" id="toggle-api-key" title="显示/隐藏">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                </button>
                            </div>
                            <div class="setting-hint" id="api-key-hint"></div>
                        </div>
                        <div class="setting-group">
                            <label class="setting-label">模型名称</label>
                            <input type="text" id="api-model" class="setting-input" placeholder="gpt-4o / claude-sonnet-4-20250514 / qwen2.5 等">
                        </div>
                    </div>

                    <div class="setting-group">
                        <button class="btn-primary btn-sm" id="save-llm-config">保存模型配置</button>
                        <span class="setting-status" id="llm-config-status"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- D3 for general use + markmap-autoloader for mind map -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script>
        // Configure markmap autoloader: manual mode, no toolbar (we have our own controls)
        window.markmap = {
            autoLoader: {
                manual: true,
                toolbar: false,
            },
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-autoloader@latest"></script>
    <script src="/static/app.js"></script>
</body>
</html>
